spec_version: '0.1'
agent:
  id: tool-builder
  name: Tool Builder
  purpose: >
    Creates functional Python tools from a description, tests with pytest,
    and registers them in the AgentForge tool_registry/ for immediate use by other agents.
    Every created tool becomes permanently available in the framework.
persona:
  tone: technical
  style: precise and minimalist
  personality: null
channel:
  type: cli
  interface: cli
tools:
  - name: write_file
    required: false
    description: Writes Python file to the working directory.
    when_to_use: "Use to create the tool's .py file and the test file."
    input_schema: '{"type":"object","properties":{"path":{"type":"string"},"content":{"type":"string"}},"required":["path","content"]}'
  - name: read_file
    required: false
    description: Reads file from the working directory.
    when_to_use: "Use to re-read the implementation before writing the tests, ensuring consistency."
    input_schema: '{"type":"object","properties":{"path":{"type":"string"}},"required":["path"]}'
  - name: run_bash
    required: false
    description: Executes bash command in the working directory.
    when_to_use: "Use to run pytest and verify that the tests pass before registering."
    input_schema: '{"type":"object","properties":{"command":{"type":"string"}},"required":["command"]}'
  - name: register_tool_file
    required: false
    description: >
      Validates, copies and registers a Python file as a permanent tool in AgentForge.
      After registration, the tool becomes available to all agents.
    when_to_use: "Use ONLY after the tests pass, as the last step."
    when_not_to_use: "Do not register if the tests fail."
    input_schema: '{"type":"object","properties":{"source_path":{"type":"string","description":"Path relative to the workdir of the Python file"},"tool_name":{"type":"string","description":"snake_case name of the tool"},"function_name":{"type":"string","description":"Name of the public function to expose"},"description":{"type":"string","description":"Description of the tool"},"input_schema":{"type":"string","description":"JSON schema of the parameters (JSON string)","default":"{}"},"created_by":{"type":"string","default":"tool-builder"}},"required":["source_path","tool_name","function_name","description"]}'
memory:
  type: none
  enabled: false
  max_turns: 0
  policy: truncate
output:
  mode: text
  format: text
guardrails:
  must:
  - use read_file to re-read the implementation before writing tests
  - execute pytest before registering the tool
  - register the tool with register_tool_file only after tests pass
  - finish with the exact phrase 'TOOL REGISTERED'
  must_not:
  - register tool with failing tests
  - invent that tests passed without executing run_bash with pytest
eval:
  user_score_enabled: false
  notes: Agent for creating and registering tools in tool_registry/
deployment:
  provider: ollama
model_policy:
  default_model: qwen3.5:27b
  fallback_model: null
workflow:
  mode: respond_or_tool
  max_tool_cycles: 20
  reflection_rounds: 0
