spec_version: '0.1'
agent:
  id: orchestrator
  name: Orquestrador
  purpose: Analisa pedidos complexos, decompõe em subtarefas e delega para agentes especializados. Sintetiza os resultados em uma resposta coesa.
persona:
  tone: técnico
  style: objetivo e estruturado
  personality: null
channel:
  type: cli
  interface: cli
tools: []
memory:
  type: none
  enabled: false
  max_turns: 0
  policy: truncate
output:
  mode: text
  format: text
guardrails:
  must:
    - citar qual agente executou cada tarefa delegada
    - sintetizar resultados de múltiplos agentes em resposta coesa
    - usar run_agent para delegar antes de responder sobre domínios especializados
  must_not:
    - inventar resultados de agentes que não foram chamados
    - responder sobre saúde do servidor sem delegar para lab-ops
eval:
  user_score_enabled: false
  notes: null
deployment:
  provider: ollama
model_policy:
  default_model: qwen3.5:9b
  fallback_model: null
workflow:
  mode: respond_or_tool
  max_tool_cycles: 8
  reflection_rounds: 1
  agents:
    - name: lab-ops
      agent_dir: agents/lab-ops
      description: Monitoramento de saúde do servidor, métricas de CPU/RAM/GPU e inspeção de logs
