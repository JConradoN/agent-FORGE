spec_version: '0.1'
agent:
  id: real-p4
  name: Skill Generator
  purpose: Generates complete and actionable skills for Claude Code from descriptions. Produces technical documentation ready for use with valid YAML frontmatter.
persona:
  tone: technical
  style: clear and actionable
  personality: null
channel:
  type: cli
  interface: cli
tools:
  - name: write_file
    required: false
    description: Writes file to the working directory.
    when_to_use: "Use to create fox-deploy.md and fox-deploy-test.sh."
    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path of the file"},"content":{"type":"string","description":"Content to write"}},"required":["path","content"]}'
  - name: read_file
    required: false
    description: Reads file from the working directory.
    when_to_use: "Use to re-read the created skill before executing the test."
    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path of the file"}},"required":["path"]}'
  - name: run_bash
    required: false
    description: Executes bash command in the working directory.
    when_to_use: "Use to execute: bash fox-deploy-test.sh"
    input_schema: '{"type":"object","properties":{"command":{"type":"string","description":"Bash command to execute"}},"required":["command"]}'
memory:
  type: none
  enabled: false
  max_turns: 0
  policy: truncate
output:
  mode: text
  format: text
guardrails:
  must:
  - include valid YAML frontmatter with name and description
  - include sections on when to use, prerequisites, step-by-step, common errors, and examples
  - execute bash fox-deploy-test.sh to validate before responding
  - finish the response with the exact phrase 'SKILL CREATED'
  must_not:
  - create skill without executing the validation test
  - omit docker compose commands or notification via Claudio
eval:
  user_score_enabled: false
  notes: Scenario REAL P4 — skill generator fox-deploy
deployment:
  provider: ollama
model_policy:
  default_model: qwen3.5:27b
  fallback_model: null
workflow:
  mode: respond_or_tool
  max_tool_cycles: 12
  reflection_rounds: 0
