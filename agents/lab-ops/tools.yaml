tools_version: '0.1'
agent_id: lab-ops
tools:
  - name: collect_system_health
    required: true
    description: Collects system health metrics (CPU, memory, disk, GPU, load average, processes)
    when_to_use: When the user asks about server status, CPU, RAM, disk, GPU, processes, load average, system health
    when_not_to_use: When the user specifically asks about logs, syslog, recent errors

  - name: read_log_tail
    required: false
    description: Reads the last lines of a system log file
    when_to_use: >
      When the user asks for syslog, system log, last log lines,
      recent log errors, suspicious log events, check log output,
      analyze log file, /var/log/syslog, messages, kern.log, etc.
    when_not_to_use: >
      When the user asks only for health metrics (CPU, RAM, disk) —
      use collect_system_health
