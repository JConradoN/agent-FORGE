eval_version: '0.1'
agent_id: lab-ops
tests:
  - name: health_check_single_turn
    description: Execute a single health check query
    input: Show server status
    expected:
      tool_executed: collect_system_health
      output_contains:
        - cpu
        - memory
        - disk
  - name: multi_turn_conversation
    description: Maintain a multi-turn conversation
    turns:
      - input: Current server status
      - input: What is the CPU usage?
    expected:
      history_length: 4
      memory_preserved: true
