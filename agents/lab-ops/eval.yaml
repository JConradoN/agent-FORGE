eval_version: '0.1'
agent_id: lab-ops
tests:
  - name: health_check_single_turn
    description: Ejecutar una sola consulta de health check
    input: Muestra el estado del servidor
    expected:
      tool_executed: collect_system_health
      output_contains:
        - cpu
        - memory
        - disco
  - name: multi_turn_conversation
    description: Mantener una conversación de múltiples turns
    turns:
      - input: Estado actual del servidor
      - input: Cuál es el uso de CPU?
    expected:
      history_length: 4
      memory_preserved: true