tools_version: '0.1'
agent_id: forge-f3
tools:
- name: http_get
  required: false
  description: Performs GET on URL and returns text. Use to fetch exchange rates and crypto.
  category: null
  status: stable
  when_to_use: Use for each rate URL (USD-BRL, EUR-BRL, BTC-BRL, ETH-BRL) and history.
  when_not_to_use: Do not use for writing files.
  input_schema: '{"type":"object","properties":{"url":{"type":"string","description":"Full API URL"},"headers":{"type":"object","description":"Optional headers","default":{}}},"required":["url"]}'
  output_schema: null
- name: write_file
  required: false
  description: Writes content to file in the working directory.
  category: null
  status: stable
  when_to_use: Use to save the analysis report in Markdown.
  when_not_to_use: null
  input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path of the file"},"content":{"type":"string","description":"Content to write"}},"required":["path","content"]}'
  output_schema: null
- name: send_claudio
  required: false
  description: Sends message via Claudio's Telegram bot to notify the user.
  category: null
  status: stable
  when_to_use: Use at the end to send exchange rates summary and trend.
  when_not_to_use: null
  input_schema: '{"type":"object","properties":{"message":{"type":"string","description":"Message to send (supports Markdown)"}},"required":["message"]}'
  output_schema: null
