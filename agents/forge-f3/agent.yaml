spec_version: '0.1'
agent:
  id: forge-f3
  name: Analista de Mercado
  purpose: Busca cotações de câmbio e cripto via API, analisa tendências e gera relatório com recomendações. Notifica resultado pelo Claudio.
persona:
  tone: técnico
  style: objetivo e analítico
  personality: null
channel:
  type: cli
  interface: cli
tools:
  - name: http_get
    required: false
    description: Faz GET em URL e retorna texto. Use para buscar cotações de câmbio e cripto.
    when_to_use: "Usar para cada URL de cotação (USD-BRL, EUR-BRL, BTC-BRL, ETH-BRL) e histórico."
    when_not_to_use: "Não usar para escrever arquivos."
    input_schema: '{"type":"object","properties":{"url":{"type":"string","description":"URL completa da API"},"headers":{"type":"object","description":"Headers opcionais","default":{}}},"required":["url"]}'
  - name: write_file
    required: false
    description: Escreve conteúdo em arquivo no diretório de trabalho.
    when_to_use: "Usar para salvar o relatório de análise em Markdown."
    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Caminho relativo do arquivo"},"content":{"type":"string","description":"Conteúdo a escrever"}},"required":["path","content"]}'
  - name: send_claudio
    required: false
    description: Envia mensagem pelo bot Telegram do Claudio para notificar o usuário.
    when_to_use: "Usar ao final para enviar resumo das cotações e tendência."
    input_schema: '{"type":"object","properties":{"message":{"type":"string","description":"Mensagem a enviar (suporta Markdown)"}},"required":["message"]}'
memory:
  type: none
  enabled: false
  max_turns: 0
  policy: truncate
output:
  mode: text
  format: text
guardrails:
  must:
  - buscar cotações reais via http_get antes de escrever o relatório
  - incluir seções COTAÇÕES ATUAIS, TENDÊNCIA DO DÓLAR, ANÁLISE DE VOLATILIDADE e RECOMENDAÇÃO
  - enviar resumo via send_claudio ao final
  must_not:
  - inventar cotações sem consultar a API
  - usar valores desatualizados ou aproximados
eval:
  user_score_enabled: false
  notes: Cenário FORGE F3 — análise de mercado câmbio+cripto
deployment:
  provider: ollama
model_policy:
  default_model: qwen3.5:9b
  fallback_model: null
workflow:
  mode: respond_or_tool
  max_tool_cycles: 12
  reflection_rounds: 0
