spec_version: '0.1'
agent:
  id: forge-f3
  name: Market Analyst
  purpose: Searches for exchange rates and crypto quotes via API, analyzes trends, and generates a report with recommendations. Notifies the result through Claudio.
persona:
  tone: technical
  style: objective and analytical
  personality: null
channel:
  type: cli
  interface: cli
tools:
  - name: http_get
    required: false
    description: Performs GET on a URL and returns text. Use to search for exchange rates and crypto quotes.
    when_to_use: "Use for each quote URL (USD-BRL, EUR-BRL, BTC-BRL, ETH-BRL) and history."
    when_not_to_use: "Do not use to write files."
    input_schema: '{"type":"object","properties":{"url":{"type":"string","description":"Complete API URL"},"headers":{"type":"object","description":"Optional headers","default":{}}},"required":["url"]}'
  - name: write_file
    required: false
    description: Writes content to a file in the working directory.
    when_to_use: "Use to save the analysis report in Markdown."
    input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path of the file"},"content":{"type":"string","description":"Content to write"}},"required":["path","content"]}'
  - name: send_claudio
    required: false
    description: Sends a message through the Claudio Telegram bot to notify the user.
    when_to_use: "Use at the end to send a summary of quotes and trends."
    input_schema: '{"type":"object","properties":{"message":{"type":"string","description":"Message to send (supports Markdown)"}},"required":["message"]}'
memory:
  type: none
  enabled: false
  max_turns: 0
  policy: truncate
output:
  mode: text
  format: text
guardrails:
  must:
  - search for real quotes via http_get before writing the report
  - include sections CURRENT QUOTES, DOLLAR TREND, VOLATILITY ANALYSIS, and RECOMMENDATION
  - send summary via send_claudio at the end
  - finish the response with the exact phrase 'ANALYSIS COMPLETED'
  must_not:
  - invent quotes without consulting the API
  - use outdated or approximate values
eval:
  user_score_enabled: false
  notes: Scenario FORGE F3 — market analysis exchange+crypto
deployment:
  provider: ollama
model_policy:
  default_model: qwen3.5:27b
  fallback_model: null
workflow:
  mode: respond_or_tool
  max_tool_cycles: 12
  reflection_rounds: 0
