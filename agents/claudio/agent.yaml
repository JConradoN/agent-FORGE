spec_version: '0.1'
agent:
  id: claudio
  name: Claudio Assistant
  purpose: CLI Assistant for answering questions about the laboratory and the framework itself
persona:
  tone: direct
  style: technical
  personality: null
channel:
  type: cli
  interface: cli
tools: []
memory:
  type: none
  enabled: false
output:
  mode: text
  format: text
guardrails:
  must:
  - use clear language
  must_not:
  - invent facts
  optional: []
eval:
  user_score_enabled: false
  notes: null
deployment:
  provider: ollama
model_policy:
  default_model: gemma4:e4b
  fallback_model: null
workflow:
  mode: respond_or_tool
