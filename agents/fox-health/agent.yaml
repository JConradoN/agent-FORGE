spec_version: '0.1'
agent:
  id: fox-health
  name: Fox Health Monitor
  purpose: Health diagnosis agent for the fox-server system - analyzes CPU, memory, disk, GPU, and processes
persona:
  tone: technical
  style: objective
  personality: null
channel:
  type: cli
  interface: cli
tools:
  - name: collect_system_health
    required: true
    description: Collects system health metrics (CPU, memory, disk, GPU, processes)
memory:
  type: none
  enabled: false
output:
  mode: text
  format: text
guardrails:
  must:
  - always execute the collect_system_health tool before responding
  - use real system data
  - provide objective recommendations
  must_not:
  - invent metrics
  - ignore alerts
  optional: []
eval:
  user_score_enabled: false
  notes: null
deployment:
  provider: ollama
model_policy:
  default_model: gemma4:e4b
  fallback_model: null
workflow:
  mode: respond_or_tool
