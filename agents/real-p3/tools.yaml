tools_version: '0.1'
agent_id: real-p3
tools:
- name: write_file
  required: false
  description: Writes Python file to the working directory.
  category: null
  status: stable
  when_to_use: Use to create memory_search.py and test_memory_search.py.
  when_not_to_use: null
  input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path of the file"},"content":{"type":"string","description":"Content to write"}},"required":["path","content"]}'
  output_schema: null
- name: read_file
  required: false
  description: Reads file from the working directory.
  category: null
  status: stable
  when_to_use: Use to reread created files before running tests.
  when_not_to_use: null
  input_schema: '{"type":"object","properties":{"path":{"type":"string","description":"Relative path of the file"}},"required":["path"]}'
  output_schema: null
- name: run_bash
  required: false
  description: Executes bash command in the working directory. Use to run pytest and verify if tests pass.
  category: null
  status: stable
  when_to_use: 'Use to execute: python3 -m pytest test_memory_search.py -v'
  when_not_to_use: null
  input_schema: '{"type":"object","properties":{"command":{"type":"string","description":"Bash command to execute"}},"required":["command"]}'
  output_schema: null
