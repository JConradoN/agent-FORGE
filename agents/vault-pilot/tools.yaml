tools_version: '0.1'
agent_id: vault-pilot
tools:
  - name: scan_directory
    required: true
    description: Lists files in the staging directory with full paths, sizes, and extensions
    when_to_use: When the user asks to list files, see what exists in staging, or perform an audit
    when_not_to_use: When the user already specifies a specific file to analyze

  - name: extract_file_content
    required: false
    description: Extracts text from files (PDF, DOC, DOCX, images, etc.), using OCR when necessary
    when_to_use: When needing to analyze the content of a specific file
    when_not_to_use: When only needing to list files without analyzing content
