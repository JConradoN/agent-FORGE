tools_version: '0.1'
agent_id: vault-pilot
tools:
  - name: scan_directory
    required: true
    description: Lista arquivos no diretório de staging com caminhos completos, tamanhos e extensões
    when_to_use: Quando o usuário pedir para listar arquivos,ver o que existe no staging, ou fazer auditoria
    when_not_to_use: Quando o usuárioja especificar um arquivo específico para analisar

  - name: extract_file_content
    required: false
    description: Extrai texto de arquivos (PDF,DOC,DOCX,imagens,etc.),usando OCR quando necessário
    when_to_use: Quando precisar analisar o conteúdo de um arquivo específico
    when_not_to_use: Quando só precisar listar arquivos sem analisar conteúdo